services:
  mock-server:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      - redis
      - minio
    environment:
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000

  echo-bot:
    build:
      context: .
      dockerfile: examples/echo_bot/Dockerfile
    restart: on-failure
    depends_on:
      - mock-server
    environment:
      BOT_TOKEN: "123456789:ABCDefGhIjKlMnOpQrStUvWxYz"
      TELEMELYA_URL: http://mock-server:8080
      WEBHOOK_EXTERNAL_HOST: echo-bot
      WEBHOOK_HOST: "0.0.0.0"
      WEBHOOK_PORT: "8081"

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
